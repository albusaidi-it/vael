version: "3.9"

services:

  api:
    build: .
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      # ── API keys (all optional) ─────────────────────────────────────────
      - NVD_API_KEY=${NVD_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - VULNCHECK_API_KEY=${VULNCHECK_API_KEY:-}
      - SHODAN_API_KEY=${SHODAN_API_KEY:-}
      - CENSYS_API_ID=${CENSYS_API_ID:-}
      - CENSYS_API_SECRET=${CENSYS_API_SECRET:-}
      # ── Server settings ─────────────────────────────────────────────────
      - VAEL_WORKERS=${VAEL_WORKERS:-2}
      - LOG_LEVEL=${LOG_LEVEL:-warning}
      - DISABLE_DOCS=${DISABLE_DOCS:-false}
      # Restrict CORS in production: ALLOW_ORIGINS=https://yourdomain.com
      - ALLOW_ORIGINS=${ALLOW_ORIGINS:-*}
    volumes:
      # SQLite cache — persists NVD/EPSS/KEV/PoC data across restarts
      - vael-cache:/app/feeds
      # Pre-built fixture data for offline demos (read-only)
      - ./fixtures:/app/fixtures:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
      # Uncomment to expose HTTPS (requires cert volume — see nginx/nginx.conf):
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment for Let's Encrypt certificates:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  vael-cache:
