worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$uri",'
        '"status":$status,'
        '"bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"user_agent":"$http_user_agent"}';

    access_log /var/log/nginx/access.log json_combined;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 20m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # Limit burst of connections per IP (allow 20 req/s, burst 50)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

    upstream vael_app {
        server api:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # ── Security headers ─────────────────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"         always;
        add_header X-Content-Type-Options    "nosniff"            always;
        add_header Referrer-Policy           "strict-origin"      always;
        add_header X-XSS-Protection          "1; mode=block"      always;
        add_header Permissions-Policy        "geolocation=()"     always;

        # ── SSE streaming endpoint — must NOT buffer ──────────────────────
        location /analyze/stream {
            limit_req zone=api_limit burst=5 nodelay;

            proxy_pass         http://vael_app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        '';

            # SSE requires chunked transfer — disable all buffering
            proxy_buffering    off;
            proxy_cache        off;
            chunked_transfer_encoding on;

            # Keep the connection alive for the full pipeline run (~60s)
            proxy_read_timeout 180s;
            proxy_send_timeout 180s;
        }

        # ── All other API / UI routes ────────────────────────────────────
        location / {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://vael_app;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        '';

            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }
    }

    # ── HTTPS (uncomment and configure after obtaining a certificate) ────
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     # ... same location blocks as above ...
    # }
    #
    # server {
    #     listen 80;
    #     server_name yourdomain.com;
    #     return 301 https://$host$request_uri;
    # }
}
